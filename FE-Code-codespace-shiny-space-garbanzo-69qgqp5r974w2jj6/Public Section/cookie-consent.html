<aside id="cookie-banner" class="cookie-banner" role="alertdialog">
    <div>
      <h3 data-i18n="cookie.title">This website uses cookies</h3>
      <p data-i18n="cookie.description">We use cookies to enhance your browsing experience and analyze our traffic. </p>
    </div>
    <div>
      <button id="btn-accept-cookies" class="btn-primary" data-i18n="cookie.accept">Accept all cookies</button>
      <button id="btn-accept-essential-cookies" class="btn-secondary" data-i18n="cookie.essential-accept">Accept essential cookies</button>
      <button id="btn-decline-cookies" class="btn-secondary" data-i18n="cookie.decline">Decline cookies</button>
    </div>
  </div>
</aside>
